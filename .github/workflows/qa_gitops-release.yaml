name: GitOps Release container image

on:
  workflow_call:
    inputs:
      repository_name:
        required: true
        description: "Name of repository"
        type: string
      repository_ref:
        required: false
        description: "Ref value of repository"
        type: string
        default: "main"
      image_name:
        required: true
        description: "Name of container registry and image"
        type: string
      image_tag:
        required: true
        description: "Tag of image"
        type: string
      application_name:
        required: false
        description: "Name of actual application"
        type: string
        default: ""
      environment_name:
        required: false
        description: "Environment name for tagging"
        type: string
        default: "dev"
      region:
        required: false
        description: "aws region"
        type: string
        default: "ap-northeast-2"
      version_json_file_path:
        required: false
        description: "Path to the yaml file described all version of application"
        type: string
        default: "qa_version.json"
      mopl_qa_aws_accountid:
        required: false
        description: "mopl qa aws account id"
        type: string
        default: "852637827699"
      cloudfront_distribution_id:
        required: false
        description: "cloudfront_distribution_id"
        type: string
        default: "EXPTNFYJG8CR8"

    secrets:
      GH_MANAGEPACKAGE_TOKEN:
        required: false
        description: "If not provided, the repo creds will be used."

permissions: write-all

jobs:
  gitops-release:
    runs-on: ubuntu-latest
    environment: 
      name: ${{ inputs.environment_name }}
    name: GitOps Release
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Checkout state repo
        uses: actions/checkout@v3
        with:
          repository: ${{ inputs.repository_name }}
          path: ./gitops
          ref: ${{ inputs.repository_ref }}
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}

      - name: Update image name and tag
        uses: mikefarah/yq@v4.34.2
        with:
          cmd: |
            yq -i '
              .images[0].newName = "${{ inputs.image_name }}" |
              .images[0].newTag = "${{ inputs.image_tag }}"
            ' ./gitops/${{ inputs.application_name }}/env/${{ vars.ENV }}/kustomization.yaml

      - name: Update server version.json information
        uses: mikefarah/yq@v4.34.2
        with:
          cmd: |
            if [[ "${{ inputs.application_name }}" == *front* || "${{ inputs.application_name }}" == "mopl-admin" ]]; then
              echo "Frontend application detected: ${{ inputs.application_name }}"
              yq -i '.FrontendVersion["${{ inputs.application_name }}"] = "${{ inputs.image_tag }}"' ./gitops/qa_version.json
            else
              echo "Backend application detected: ${{ inputs.application_name }}"
              yq -i '.BackendVersion["${{ inputs.application_name }}"] = "${{ inputs.image_tag }}"' ./gitops/qa_version.json
            fi


      - name: Create QA GitOps Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          path: ./gitops
          token: ${{ secrets.GH_MANAGEPACKAGE_TOKEN }}
          commit-message: |
            chore: update ${{ inputs.application_name }} image tag to ${{ inputs.image_tag }}
          branch: |
            gitops/${{ inputs.application_name }}-${{ inputs.image_tag }}
          title: |
            Update QA image tag for ${{ inputs.application_name }}: ${{ inputs.image_tag }}
          body: |
            This PR updates the deployment configuration for ${{ inputs.application_name }}.

            - Image name: `${{ inputs.image_name }}`
            - Image tag: `${{ inputs.image_tag }}`
            - Environment: `${{ vars.ENV }}`

            Please review and merge after verification.
          base: main
          labels: |
            qa_deploy
          delete-branch: true